<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: Canvas; color: CanvasText; }
    main { width: min(720px, calc(100% - 32px)); padding: 48px 0; }
    h1 { font-size: clamp(2rem, 8vw, 4rem); line-height: 1; margin: 0 0 16px; }
    p { font-size: 1.125rem; line-height: 1.7; margin: 0; opacity: .75; }
  </style>
</head>
<body>
  <main>
    <h1>Welcome</h1>
    <p>This Python app is running normally.</p>
  </main>
</body>
</html>
